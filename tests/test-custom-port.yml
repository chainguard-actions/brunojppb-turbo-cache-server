name: Test custom port configuration
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Turbo Cache Server on custom port
        id: action
        uses: .
        env:
          PORT: "9090"
          HOST: "127.0.0.1"
          S3_BUCKET_NAME: "test-bucket"
          S3_REGION: "us-east-1"
          S3_ACCESS_KEY: "test-access-key"
          S3_SECRET_KEY: "test-secret-key"

      - name: Assert server is healthy on custom port
        run: |
          echo "Checking server health at http://127.0.0.1:9090/management/health"
          response=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9090/management/health || echo "000")
          echo "HTTP response code: $response"
          if [ "$response" != "200" ]; then
            echo "FAIL: expected HTTP 200 from health endpoint on port 9090, got $response"
            exit 1
          fi
          echo "PASS: server is healthy on custom port 9090"

      - name: Assert server is NOT running on default port
        run: |
          echo "Verifying server is not on default port 8000"
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://127.0.0.1:8000/management/health || echo "000")
          echo "HTTP response code on port 8000: $response"
          if [ "$response" = "200" ]; then
            echo "FAIL: server should not be running on default port 8000"
            exit 1
          fi
          echo "PASS: server is not on default port 8000"
